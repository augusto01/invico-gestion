<div class="dashboard-container">
  <header class="header">
    <h1>Portal de Obras - INVICO <span class="badge-version">v15.2</span></h1>
  </header>

  <div class="main-layout">
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Expediente / Obra</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let obra of listado" (click)="verDetalle(obra)">
            <td class="id-cell">#{{ obra.id }}</td>
            <td><strong>{{ obra.title | uppercase }}</strong></td>
          </tr>
        </tbody>
      </table>
    </div>

    <aside class="detail-panel" *ngIf="seleccionada">
      <h3>Detalle Técnico</h3>
      <div class="detail-content">
        <p><strong>ID:</strong> {{ seleccionada.id }}</p>
        <p><strong>Título:</strong> {{ seleccionada.title }}</p>
        <p><strong>Informe:</strong> {{ seleccionada.body }}</p>
      </div>
      <button class="btn-close" (click)="seleccionada = undefined">Cerrar Detalle</button>
    </aside>
  </div>
</div>
