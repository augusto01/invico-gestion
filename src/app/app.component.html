<div class="dashboard-container">
  
  <header class="header">
    <div class="brand-wrapper">
      <div class="logo-container">
        <img src="assets/INVICO-logo.svg" alt="INVICO Corrientes" class="logo-invico">
      </div>
      <div class="header-separator"></div>
      <div class="header-title">
        <h1></h1>
        <span class="header-subtitle"></span>
      </div>
    </div>
    <div class="status-badge">
      <span class="status-dot"></span> 
      INSTITUTO DE VIVIENDA DE CORRIENTES
      v15.2
    </div>
  </header>

  <section class="search-area">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input 
        type="text" 
        class="search-box" 
        [(ngModel)]="searchTerm" 
        (ngModelChange)="filtrar()" 
        placeholder="Buscar expediente o nombre del proyecto..."
      >
    </div>
  </section>

  <div class="stats-grid">
    <div class="data-card kpi-total">
      <span class="stat-label">Obras en Seguimiento</span>
      <span class="stat-value">{{ listadoFiltrado.length }}</span>
    </div>
    <div class="data-card kpi-geo">
      <span class="stat-label">Jurisdicción</span>
      <span class="stat-value geo-text">Provincia de Corrientes</span>
    </div>
  </div>

  <div class="main-layout">
    <div class="table-container">
      <div class="table-header">
        LISTADO DE EXPEDIENTES ACTIVOS
      </div>
      <table class="main-table">
        <tbody>
          <tr *ngFor="let obra of listadoFiltrado" 
              (click)="verDetalle(obra)" 
              [class.selected-row]="seleccionada?.id === obra.id">
            <td class="obra-cell">
              <div class="obra-id">#{{ obra.id }}</div>
              <div class="obra-title-row">{{ obra.title | uppercase }}</div>
              <div class="obra-tag">Obra Pública Seleccionada</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <aside class="detail-panel" *ngIf="seleccionada">
      <h3 class="detail-header">Ficha Técnica</h3>
      
      <div class="detail-group">
        <label class="detail-label">Proyecto</label>
        <p class="detail-project-name">{{ seleccionada.title }}</p>
      </div>

      <div class="detail-group">
        <label class="detail-label">Informe Técnico</label>
        <div class="report-box">
          {{ seleccionada.body }}
        </div>
      </div>

      <button (click)="seleccionada = undefined" class="btn-invico">
        CERRAR DETALLE
      </button>
    </aside>
  </div>
</div>
